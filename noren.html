<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noren — intro de entrada con simulación de tela (WebGL)</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: sans-serif; background: #dd8a42; }

  /* El contenido real de la web va debajo del canvas */
  #site {
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px; padding: 2rem; text-align: center;
  }
  #site .logo {
    width: 64px; height: 64px; border-radius: 50%;
    background: #28407a; color: #f3efe4;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
  }
  #site h1 { font-size: 26px; font-weight: 500; margin: 0; color: #222; }
  #site p { font-size: 15px; color: #666; margin: 0; max-width: 420px; line-height: 1.7; }

  /* El noren: canvas fijo cubriendo toda la ventana, por encima del sitio */
  #cv {
    position: fixed; inset: 0;
    width: 100vw; height: 100vh;
    display: block; z-index: 10;
  }

  #enter {
    position: fixed; left: 50%; top: 58%;
    transform: translate(-50%, -50%);
    z-index: 11;
    font-size: 15px; padding: 12px 32px;
    background: #faf3e3; color: #8a5a2b;
    border: 1px solid #dcc196; border-radius: 999px;
    cursor: pointer;
    transition: opacity .4s;
  }
  #enter:hover { background: #fffdf5; }
  #enter.hidden { opacity: 0; pointer-events: none; }
</style>
</head>
<body>

<!-- Contenido de la web (queda detrás del noren hasta que se abre) -->
<div id="site">
  <div class="logo">の</div>
  <h1>ようこそ、当店へ</h1>
  <p>のれんをくぐりました。ここからは通常のサイトが始まります――ヒーロー、ナビゲーション、コンテンツ。ここでエントランスアニメーション(GSAPなど)をつなげていきます。</p>
</div>

<!-- Capa del intro -->
<canvas id="cv"></canvas>
<button id="enter">Welcome</button>

<script type="module">
/* ============================================================
   NOREN (WebGL/Three.js) — experimento de reescritura del motor
   de dibujo, manteniendo la física 2D (Verlet) tal cual.
   ------------------------------------------------------------
   Diferencias clave frente a la versión canvas 2D:
   - El sombreado de los pliegues ya no se pinta a mano por celda:
     se deriva una pequeña Z (relieve) a partir de la compresión
     local de la malla, y la GPU interpola la iluminación por
     píxel entre vértices (Gouraud/Phong) — así con la MISMA malla
     que en 2D la luz sale suave, sin depender de la resolución.
   - El texto es una textura UV normal sobre la malla: nítida a
     cualquier resolución, sin el truco de warp por triángulos.
   - Coordenadas: se reutiliza el mismo sistema "y hacia abajo" de
     la física original; solo se invierte el signo al escribir en
     el buffer de Three.js (mundo Y hacia arriba).
   ============================================================ */
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

const cv = document.getElementById('cv');
const enterBtn = document.getElementById('enter');

let W = innerWidth, H = innerHeight;
const DPR = Math.min(2, window.devicePixelRatio || 1);

/* ---------- Parámetros (idénticos a la versión 2D) ---------- */
const STRIPS = 4;
const COLS   = 17;
const ROWS   = 30;
const rodY   = 12;

const WIND = 0.013;
const WIND_Y = -1.5;
const FREQ1 = 0.9, FREQ2 = 0.5;
const FOLD_DEPTH = 40; // profundidad del relieve simulado (Z), en px
const GUST_DEPTH = 34; // amplitud de la ráfaga hacia el espectador (Z), en px

const DUR = 1900;

/* ---------- Textura de la tela (misma receta que en 2D) ---------- */
const TEX_W = 2000, TEX_H = 1000;

const fabricCanvas = document.createElement('canvas');
fabricCanvas.width = TEX_W; fabricCanvas.height = TEX_H;
const fx = fabricCanvas.getContext('2d');

fx.fillStyle = 'rgb(247,241,222)';
fx.fillRect(0, 0, TEX_W, TEX_H);

// Tejido fino tipo lino: patrón repetible a cuadros diminutos (mucho
// más denso/regular que el ruido disperso anterior), pintado de una
// sola vez con createPattern para que sea barato.
const WEAVE = 3;
const tile = document.createElement('canvas');
tile.width = tile.height = WEAVE * 2;
const tctx = tile.getContext('2d');
tctx.fillStyle = 'rgba(58,44,20,0.05)';
tctx.fillRect(0, 0, WEAVE, WEAVE);
tctx.fillRect(WEAVE, WEAVE, WEAVE, WEAVE);
tctx.fillStyle = 'rgba(255,253,246,0.35)';
tctx.fillRect(WEAVE, 0, WEAVE, WEAVE);
tctx.fillRect(0, WEAVE, WEAVE, WEAVE);
fx.fillStyle = fx.createPattern(tile, 'repeat');
fx.fillRect(0, 0, TEX_W, TEX_H);

// Un poco de grano irregular encima, para que no se vea perfectamente
// mecánico.
for (let i = 0; i < 4000; i++) {
  const gx = Math.random() * TEX_W, gy = Math.random() * TEX_H;
  const dark = Math.random() < 0.5;
  fx.fillStyle = dark ? 'rgba(70,50,25,0.03)' : 'rgba(255,252,240,0.15)';
  fx.fillRect(gx, gy, 1.6, 1.6);
}

const HEM_LINE_FRAC = 0.05;
fx.strokeStyle = 'rgba(201,154,91,0.5)';
fx.lineWidth = 2.5;
fx.beginPath();
fx.moveTo(0, TEX_H * (1 - HEM_LINE_FRAC));
fx.lineTo(TEX_W, TEX_H * (1 - HEM_LINE_FRAC));
fx.stroke();

// Halo de luz suave, centrado detrás del texto, más flojo que antes.
const halo = fx.createRadialGradient(TEX_W * 0.5, TEX_H * 0.32, 0, TEX_W * 0.5, TEX_H * 0.32, TEX_W * 0.55);
halo.addColorStop(0, 'rgba(255,255,255,0.5)');
halo.addColorStop(0.35, 'rgba(255,255,255,0.22)');
halo.addColorStop(0.7, 'rgba(255,255,255,0.06)');
halo.addColorStop(1, 'rgba(255,255,255,0)');
fx.fillStyle = halo;
fx.fillRect(0, 0, TEX_W, TEX_H);
fx.globalCompositeOperation = 'source-over';

const textCanvas = document.createElement('canvas');
textCanvas.width = TEX_W; textCanvas.height = TEX_H;
const tx = textCanvas.getContext('2d');
tx.fillStyle = 'rgb(224,163,111)';
tx.textAlign = 'center';
tx.textBaseline = 'middle';
tx.font = '800 150px "Hiragino Maru Gothic ProN", "M PLUS Rounded 1c", "Yu Gothic", sans-serif';
tx.fillText('和の「おもてなし」で、', TEX_W / 2, TEX_H * 0.30);
tx.fillText('旅を彩る。', TEX_W / 2, TEX_H * 0.30 + 175);

const fabricTexture = new THREE.CanvasTexture(fabricCanvas);
const textTexture = new THREE.CanvasTexture(textCanvas);
fabricTexture.colorSpace = THREE.SRGBColorSpace;
textTexture.colorSpace = THREE.SRGBColorSpace;

/* ---------- Escena Three.js ---------- */
const renderer = new THREE.WebGLRenderer({ canvas: cv, antialias: true, alpha: true });
renderer.setPixelRatio(DPR);
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
const camera = new THREE.OrthographicCamera(0, W, 0, -H, -2000, 2000);
camera.position.z = 500;

// Three.js r155+ usa unidades de luz físicas: hacen falta valores mucho
// más altos que en versiones antiguas para un look "sin sombras duras".
// Blanco puro para no desviar el color de la tela (ya es cálida de por sí).
scene.add(new THREE.AmbientLight(0xffffff, 3.0));
const sun = new THREE.DirectionalLight(0xffffff, 1.8);
sun.position.set(-1.3, 0.6, 0.35); // rasante desde la izquierda, para que el relieve se lea
scene.add(sun);

// Barra superior
const rodGeo = new THREE.PlaneGeometry(1, 4);
const rodMat = new THREE.MeshBasicMaterial({ color: 0x8a7156 });
const rod = new THREE.Mesh(rodGeo, rodMat);
scene.add(rod);

function idx(r, c) { return r * COLS + c; }

let cellW, cellH, clothH, stripW, gap, strips = [];
const seamLines = []; // { line, stripIndex, side: 'right'|'left' }

function disposeStrips() {
  for (const st of strips) {
    scene.remove(st.fabricMesh, st.textMesh);
    st.geometry.dispose();
    st.fabricMesh.material.dispose?.();
  }
  for (const s of seamLines) {
    scene.remove(s.line);
    s.line.geometry.dispose();
  }
  seamLines.length = 0;
  strips = [];
}

function build() {
  W = innerWidth; H = innerHeight;
  renderer.setSize(W, H, false);
  camera.right = W;
  camera.bottom = -H;
  camera.updateProjectionMatrix();

  disposeStrips();

  gap = 5;
  stripW = (W - gap * (STRIPS - 1)) / STRIPS;
  cellW = stripW / (COLS - 1);
  clothH = H * 0.9 - rodY;
  cellH = clothH / (ROWS - 1);

  rod.scale.set(W + 60, 1, 1);
  rod.position.set(W / 2, -(rodY - 2), 1);

  for (let s = 0; s < STRIPS; s++) {
    const pts = [];
    const sx = s * (stripW + gap);
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const x = sx + c * cellW;
        const y = rodY + r * cellH;
        pts.push({
          x, y, z: 0,
          px: x, py: y,
          rx: x, ry: y,
          pin: r === 0
        });
      }
    }

    // Geometría compartida por la malla de tela y la de texto
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(COLS * ROWS * 3);
    const uvs = new Float32Array(COLS * ROWS * 2);
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const p = pts[idx(r, c)];
        const i3 = idx(r, c) * 3, i2 = idx(r, c) * 2;
        positions[i3] = p.x; positions[i3 + 1] = -p.y; positions[i3 + 2] = 0;
        uvs[i2] = p.rx / W; uvs[i2 + 1] = 1 - (p.ry - rodY) / clothH;
      }
    }
    const indices = [];
    for (let r = 0; r < ROWS - 1; r++) {
      for (let c = 0; c < COLS - 1; c++) {
        const a = idx(r, c), b = idx(r, c + 1), cc = idx(r + 1, c + 1), d = idx(r + 1, c);
        indices.push(a, b, d, b, cc, d);
      }
    }
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('uv', new THREE.BufferAttribute(uvs, 2));
    geometry.setIndex(indices);
    geometry.computeVertexNormals();

    // Sin test/escritura de profundidad real: el orden visual entre tiras
    // lo decide el orden de dibujo (como en la v2D), no la Z (que aquí solo
    // se usa para el relieve de los pliegues, no para saber qué paño tapa
    // a cuál cuando el viento los solapa en pantalla).
    // transparent:true (aunque sea opaca) para que entre en el mismo grupo
    // de dibujo que el texto y las costuras: si no, Three.js pintaría
    // siempre primero TODA la tela "opaca" de las 4 tiras y luego todo lo
    // "transparente" encima, ignorando el renderOrder entre tiras distintas.
    const fabricMat = new THREE.MeshStandardMaterial({ map: fabricTexture, roughness: 0.9, metalness: 0, side: THREE.DoubleSide, depthTest: false, depthWrite: false, transparent: true });
    const fabricMesh = new THREE.Mesh(geometry, fabricMat);
    fabricMesh.renderOrder = s * 10;
    scene.add(fabricMesh);

    const textMat = new THREE.MeshBasicMaterial({ map: textTexture, transparent: true, depthTest: false, depthWrite: false, side: THREE.DoubleSide });
    const textMesh = new THREE.Mesh(geometry, textMat);
    textMesh.renderOrder = s * 10 + 2;
    scene.add(textMesh);

    strips.push({ pts, sx, geometry, fabricMesh, textMesh });
  }

  // Costuras: 2 líneas por hueco interno, actualizadas cada frame.
  // Cada costura pertenece a la tira dueña de sus propios puntos (igual
  // que en la v2D), y se dibuja justo después de la tela de esa tira.
  for (let i = 0; i < strips.length - 1; i++) {
    for (const side of ['right', 'left']) {
      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(ROWS * 3), 3));
      const mat = new THREE.LineBasicMaterial({ color: 0xc99a5b, transparent: true, opacity: 0.5, depthTest: false, depthWrite: false });
      const line = new THREE.Line(geo, mat);
      const stripIndex = side === 'right' ? i : i + 1;
      line.renderOrder = stripIndex * 10 + 1;
      scene.add(line);
      seamLines.push({ line, stripIndex, side });
    }
  }
}

build();
window.addEventListener('resize', () => { if (phase === 'idle') build(); });

/* ---------- Estado del intro ---------- */
let phase = 'idle';
let openStart = 0;
let t = 0;

const reducedMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;

function easeOutCubic(p) { return 1 - Math.pow(1 - p, 3); }
function easeInOut(p) { return p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2; }

function finishIntro() {
  phase = 'open';
  cv.style.display = 'none';
  enterBtn.classList.add('hidden');
}

enterBtn.addEventListener('click', () => {
  if (phase !== 'idle') return;
  if (reducedMotion) { finishIntro(); return; }
  phase = 'opening';
  openStart = performance.now();
  enterBtn.classList.add('hidden');
});

/* ---------- Física (idéntica a la v2D) ---------- */
function step(prog) {
  t += 0.016;

  const cx = W / 2;
  const cy = rodY + clothH * 0.55;
  const R = phase === 'opening'
    ? easeOutCubic(prog) * Math.max(W, H) * 0.52
    : 0;
  const diag = Math.sqrt(cellW * cellW + cellH * cellH);

  for (const st of strips) {
    const pts = st.pts;

    for (let r = 0; r < ROWS; r++) {
      const weight = r / (ROWS - 1);
      // Curva más pronunciada (weight^2.5): casi toda la fuerza vertical
      // se concentra en la parte de abajo, para que balancee como un
      // péndulo en vez de ondular por igual en toda la altura.
      const weightY = Math.pow(weight, 2.5);
      for (let c = 0; c < COLS; c++) {
        const p = pts[idx(r, c)];
        if (p.pin) { p.x = p.rx; p.y = p.ry; continue; }

        const noise =
          Math.sin(t * FREQ1 + p.ry * 0.015 + st.sx * 0.01) +
          0.6 * Math.sin(t * FREQ2 + p.rx * 0.02);

        const noiseY =
          Math.sin(t * FREQ1 * 0.8 + p.rx * 0.025 + p.ry * 0.012 + st.sx * 0.02) +
          0.5 * Math.sin(t * FREQ2 * 1.4 + p.rx * 0.05 + p.ry * 0.02);

        const ax = noise * WIND * weight;
        // Más gravedad + más amortiguación = tela más pesada: cae más
        // recta y con menos rebote, en vez de flotar ligera.
        const ay = 0.35 + noiseY * WIND_Y * weightY;

        const vx = (p.x - p.px) * 0.985;
        const vy = (p.y - p.py) * 0.985;
        p.px = p.x; p.py = p.y;
        p.x += vx + ax;
        p.y += vy + ay;
      }
    }

    for (let it = 0; it < 4; it++) {
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const a = pts[idx(r, c)];
          if (c < COLS - 1) relax(a, pts[idx(r, c + 1)], cellW);
          if (r < ROWS - 1) relax(a, pts[idx(r + 1, c)], cellH);
          // "Flexión": une cada punto con el de 2 filas más abajo, débil,
          // para que la tela resista doblarse en pliegues cerrados abajo
          // sin dejar de balancearse en conjunto.
          if (r < ROWS - 2) relax(a, pts[idx(r + 2, c)], cellH * 2, 0.4);
          // Cizalla diagonal: refuerzo en cruz para que las columnas de
          // los bordes exteriores (con un solo vecino horizontal tirando
          // de ellas) no se retuerzan sueltas bajo el viento vertical.
          if (r < ROWS - 1 && c < COLS - 1) relax(a, pts[idx(r + 1, c + 1)], diag, 0.3);
          if (r < ROWS - 1 && c > 0) relax(a, pts[idx(r + 1, c - 1)], diag, 0.3);
        }
      }
      if (R > 0) {
        for (const p of pts) {
          if (p.pin) continue;
          const dx = p.x - cx;
          const dy = (p.y - cy) * 1.6;
          const d2 = dx * dx + dy * dy;
          if (d2 < R * R && d2 > 0.01) {
            const d = Math.sqrt(d2), k = R / d;
            p.x = cx + dx * k;
            p.y = cy + (dy * k) / 1.6;
          }
        }
      }
    }

    // Relieve simulado (Z): a partir de la compresión local de la malla,
    // para que la GPU pueda iluminarlo con normales suaves de verdad.
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const p = pts[idx(r, c)];
        let shH = 1, shV = 1;
        if (c > 0 && c < COLS - 1) {
          shH = (pts[idx(r, c + 1)].x - pts[idx(r, c - 1)].x) / (2 * cellW);
        }
        if (r > 0 && r < ROWS - 1) {
          shV = (pts[idx(r + 1, c)].y - pts[idx(r - 1, c)].y) / (2 * cellH);
        }
        const relief = (shH - 1) + (shV - 1) * 0.6;

        // "Ráfaga" hacia el espectador: una onda amplia y lenta que
        // empuja la tela hacia la cámara (Z+), superpuesta al relieve
        // fino de los pliegues. Simula viento soplando hacia el usuario.
        const rWeight = Math.pow(r / (ROWS - 1), 1.5);
        const gust = Math.sin(t * 0.6 + p.rx * 0.015 + p.ry * 0.01 + st.sx * 0.015) * rWeight;

        p.z = Math.max(-1, Math.min(1, relief)) * FOLD_DEPTH + gust * GUST_DEPTH;
      }
    }
  }
}

function relax(a, b, rest, strength = 0.5) {
  const dx = b.x - a.x, dy = b.y - a.y;
  const d = Math.sqrt(dx * dx + dy * dy) || 0.001;
  const diff = (d - rest) / d * strength;
  if (!a.pin) { a.x += dx * diff; a.y += dy * diff; }
  if (!b.pin) { b.x -= dx * diff; b.y -= dy * diff; }
}

// Asienta la tela en su forma de reposo antes del primer frame
for (let i = 0; i < 90; i++) step(0);

/* ---------- Volcado a GPU ---------- */
const SEAM_INSET = 10;

function syncMeshes() {
  const insetT = Math.min(1, SEAM_INSET / cellW);

  for (const st of strips) {
    const pos = st.geometry.attributes.position;
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const p = st.pts[idx(r, c)];
        const i = idx(r, c);
        pos.setXYZ(i, p.x, -p.y, p.z);
      }
    }
    pos.needsUpdate = true;
    st.geometry.computeVertexNormals();
  }

  for (const { line, stripIndex, side } of seamLines) {
    const pts = strips[stripIndex].pts;
    const pos = line.geometry.attributes.position;
    for (let r = 0; r < ROWS; r++) {
      const edge = side === 'right' ? pts[idx(r, COLS - 1)] : pts[idx(r, 0)];
      const inner = side === 'right' ? pts[idx(r, COLS - 2)] : pts[idx(r, 1)];
      const x = edge.x + (inner.x - edge.x) * insetT;
      const y = edge.y + (inner.y - edge.y) * insetT;
      const z = edge.z + (inner.z - edge.z) * insetT;
      pos.setXYZ(r, x, -y, z + 0.5);
    }
    pos.needsUpdate = true;
  }
}

/* ---------- Bucle ---------- */
function loop(now) {
  let prog = 0;

  if (phase === 'opening') {
    prog = Math.min(1, (now - openStart) / DUR);
    cv.style.opacity = prog < 0.55 ? '1' : String(1 - (prog - 0.55) / 0.45);
    if (prog >= 1) finishIntro();
  }

  if (phase !== 'open') {
    step(prog);
    syncMeshes();

    // "Cámara": zoom ortográfico hacia el punto de apertura
    const cx = W / 2, cyWorld = -(rodY + clothH * 0.55);
    const s = phase === 'opening' ? 1 + easeInOut(prog) * 1.5 : 1;
    const halfW = (W / 2) / s, halfH = (H / 2) / s;
    camera.left = cx - halfW; camera.right = cx + halfW;
    camera.top = cyWorld + halfH; camera.bottom = cyWorld - halfH;
    camera.updateProjectionMatrix();

    renderer.render(scene, camera);
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>

</body>
</html>
