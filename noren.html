<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noren — intro de entrada con simulación de tela</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: sans-serif; background: #dd8a42; }

  /* El contenido real de la web va debajo del canvas */
  #site {
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px; padding: 2rem; text-align: center;
  }
  #site .logo {
    width: 64px; height: 64px; border-radius: 50%;
    background: #28407a; color: #f3efe4;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
  }
  #site h1 { font-size: 26px; font-weight: 500; margin: 0; color: #222; }
  #site p { font-size: 15px; color: #666; margin: 0; max-width: 420px; line-height: 1.7; }

  /* El noren: canvas fijo cubriendo toda la ventana, por encima del sitio */
  #cv {
    position: fixed; inset: 0;
    width: 100vw; height: 100vh;
    display: block; z-index: 10;
  }

  #enter {
    position: fixed; left: 50%; top: 58%;
    transform: translate(-50%, -50%);
    z-index: 11;
    font-size: 15px; padding: 12px 32px;
    background: #faf3e3; color: #8a5a2b;
    border: 1px solid #dcc196; border-radius: 999px;
    cursor: pointer;
    transition: opacity .4s;
  }
  #enter:hover { background: #fffdf5; }
  #enter.hidden { opacity: 0; pointer-events: none; }
</style>
</head>
<body>

<!-- Contenido de la web (queda detrás del noren hasta que se abre) -->
<div id="site">
  <div class="logo">の</div>
  <h1>ようこそ、当店へ</h1>
  <p>のれんをくぐりました。ここからは通常のサイトが始まります――ヒーロー、ナビゲーション、コンテンツ。ここでエントランスアニメーション(GSAPなど)をつなげていきます。</p>
</div>

<!-- Capa del intro -->
<canvas id="cv"></canvas>
<button id="enter">Welcome</button>

<script>
/* ============================================================
   NOREN — intro de entrada con simulación de tela (Verlet 2D)
   ------------------------------------------------------------
   Piezas:
   1. FÍSICA — malla de partículas por tira, integración Verlet,
      constraints de distancia, viento suave ponderado por altura.
   2. APERTURA — al pulsar "Entrar", un colisionador circular
      invisible crece en el centro y proyecta fuera las
      partículas: las tiras centrales se apartan. El círculo está
      achatado en vertical (dy * 1.6) para que empuje sobre todo
      hacia los lados.
   3. CÁMARA — durante la apertura se escala el dibujo alrededor
      del centro (translate → scale → translate), simulando un
      dolly hacia dentro. En 3D esto sería mover la cámara en Z.
   4. REVELACIÓN — a partir del 55% del progreso el canvas funde
      su opacidad y al llegar a 1 se oculta, dejando el sitio
      (que siempre estuvo en el DOM debajo) interactivo.
   ============================================================ */

const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const enterBtn = document.getElementById('enter');

let W = innerWidth, H = innerHeight;
const DPR = Math.min(2, window.devicePixelRatio || 1);

function resize() {
  W = innerWidth; H = innerHeight;
  cv.width = W * DPR;
  cv.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}

/* ---------- Parámetros ---------- */
const STRIPS = 4;     // tiras del noren
const COLS   = 11;    // partículas por fila (en cada tira)
const ROWS   = 20;    // partículas por columna
const rodY   = 12;    // altura de la barra

// Viento: amplitud pequeña y frecuencias bajas = brisa suave.
// Sube WIND (p. ej. a 0.3) y las frecuencias para más vendaval.
const WIND = 0.04;
const FREQ1 = 0.9, FREQ2 = 0.5;

const DUR = 1900;     // duración de la apertura en ms

let cellW, cellH, clothH, stripW, gap, strips = [];

function build() {
  resize();
  gap = 2;                                       // rendija entre tiras (mínima: la división visual la da la costura, no el hueco)
  stripW = (W - gap * (STRIPS - 1)) / STRIPS;    // noren a pantalla completa
  cellW = stripW / (COLS - 1);
  clothH = H * 0.9 - rodY;                       // el noren cubre el 90% del alto, no llega al suelo
  cellH = clothH / (ROWS - 1);
  strips = [];

  for (let s = 0; s < STRIPS; s++) {
    const pts = [];
    const sx = s * (stripW + gap);
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const x = sx + c * cellW;
        const y = rodY + r * cellH;
        pts.push({
          x, y,          // posición actual
          px: x, py: y,  // posición anterior (Verlet)
          rx: x, ry: y,  // posición de reposo (UVs y anclaje)
          pin: r === 0   // fila superior cosida a la barra
        });
      }
    }
    strips.push({ pts, sx });
  }
}

build();
window.addEventListener('resize', () => { if (phase === 'idle') build(); });

/* ---------- Estado del intro ---------- */
let phase = 'idle';   // 'idle' → 'opening' → 'open'
let openStart = 0;
let t = 0;

// Asienta la tela en su forma de reposo antes de pintar el primer
// frame, para que no "bote" de golpe al cargar la página.
for (let i = 0; i < 90; i++) step(0);

const reducedMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;

function easeOutCubic(p) { return 1 - Math.pow(1 - p, 3); }
function easeInOut(p) { return p < 0.5 ? 2*p*p : 1 - Math.pow(-2*p + 2, 2) / 2; }

function finishIntro() {
  phase = 'open';
  cv.style.display = 'none';
  enterBtn.classList.add('hidden');
  // Aquí lanzarías las animaciones de entrada del hero.
}

enterBtn.addEventListener('click', () => {
  if (phase !== 'idle') return;
  if (reducedMotion) { finishIntro(); return; } // accesibilidad: sin animación
  phase = 'opening';
  openStart = performance.now();
  enterBtn.classList.add('hidden');
});

/* Para saltar el intro en visitas repetidas, descomenta:
if (sessionStorage.getItem('norenSeen')) finishIntro();
// ...y dentro de finishIntro():
// sessionStorage.setItem('norenSeen', '1');
*/

function idx(r, c) { return r * COLS + c; }

/* ---------- Física ---------- */
function step(prog) {
  t += 0.016;

  // Colisionador: crece de 0 a ~media pantalla durante la apertura
  const cx = W / 2;
  const cy = rodY + clothH * 0.55;
  const R = phase === 'opening'
    ? easeOutCubic(prog) * Math.max(W, H) * 0.52
    : 0;

  for (const st of strips) {
    const pts = st.pts;

    // 1) Verlet + fuerzas
    for (let r = 0; r < ROWS; r++) {
      const weight = r / (ROWS - 1); // 0 arriba, 1 abajo
      for (let c = 0; c < COLS; c++) {
        const p = pts[idx(r, c)];
        if (p.pin) { p.x = p.rx; p.y = p.ry; continue; }

        // Brisa: dos senos superpuestos, fase según posición de reposo
        const noise =
          Math.sin(t * FREQ1 + p.ry * 0.015 + st.sx * 0.01) +
          0.6 * Math.sin(t * FREQ2 + p.rx * 0.02);

        const ax = noise * WIND * weight;
        const ay = 0.35; // gravedad ligera

        const vx = (p.x - p.px) * 0.985;
        const vy = (p.y - p.py) * 0.985;
        p.px = p.x; p.py = p.y;
        p.x += vx + ax;
        p.y += vy + ay;
      }
    }

    // 2) Constraints + colisión con el círculo de apertura
    for (let it = 0; it < 4; it++) {
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const a = pts[idx(r, c)];
          if (c < COLS - 1) relax(a, pts[idx(r, c + 1)], cellW);
          if (r < ROWS - 1) relax(a, pts[idx(r + 1, c)], cellH);
        }
      }
      if (R > 0) {
        for (const p of pts) {
          if (p.pin) continue;
          // Elipse: achatamos dy para empujar sobre todo en horizontal
          const dx = p.x - cx;
          const dy = (p.y - cy) * 1.6;
          const d2 = dx * dx + dy * dy;
          if (d2 < R * R && d2 > 0.01) {
            const d = Math.sqrt(d2), k = R / d;
            p.x = cx + dx * k;
            p.y = cy + (dy * k) / 1.6;
          }
        }
      }
    }
  }
}

function relax(a, b, rest) {
  const dx = b.x - a.x, dy = b.y - a.y;
  const d = Math.sqrt(dx * dx + dy * dy) || 0.001;
  const diff = (d - rest) / d * 0.5;
  if (!a.pin) { a.x += dx * diff; a.y += dy * diff; }
  if (!b.pin) { b.x -= dx * diff; b.y -= dy * diff; }
}

/* ---------- Render ---------- */

/* Dos texturas en resolución alta e independiente de la malla física,
   pintadas sobre la tela deformada con una transformación afín por
   triángulo (2 por celda): la base de la tela (crema + grano + orla)
   y el texto por separado, para poder dibujar el texto por encima de
   las costuras. Al usar la posición de reposo (rx,ry) como coordenada
   de textura, ambas se deforman y se separan con la tela — no son
   capas flotantes aparte. */
const TEX_W = 2000, TEX_H = 1000;

const fabricTex = document.createElement('canvas');
fabricTex.width = TEX_W; fabricTex.height = TEX_H;
const fx = fabricTex.getContext('2d');

fx.fillStyle = 'rgb(247,241,222)';
fx.fillRect(0, 0, TEX_W, TEX_H);

// Grano: motas muy finas y sutiles para la rugosidad del tejido
for (let i = 0; i < 22000; i++) {
  const gx = Math.random() * TEX_W, gy = Math.random() * TEX_H;
  const dark = Math.random() < 0.5;
  fx.fillStyle = dark ? 'rgba(70,50,25,0.03)' : 'rgba(255,252,240,0.22)';
  fx.fillRect(gx, gy, 1.6, 1.6);
}

// Bordado inferior: una única línea fina de hilo dorado cerca del
// borde de abajo (no una banda rellena), como la costura vertical
// entre paños. Al estar en la textura ondula con la caída de la tela.
const HEM_LINE_FRAC = 0.05;
fx.strokeStyle = 'rgba(201,154,91,0.5)';
fx.lineWidth = 2.5;
fx.beginPath();
fx.moveTo(0, TEX_H * (1 - HEM_LINE_FRAC));
fx.lineTo(TEX_W, TEX_H * (1 - HEM_LINE_FRAC));
fx.stroke();

// Texto: en su propia textura (transparente alrededor) para poder
// pintarlo por encima de las costuras.
const textTex = document.createElement('canvas');
textTex.width = TEX_W; textTex.height = TEX_H;
const tx = textTex.getContext('2d');
tx.fillStyle = 'rgb(224,163,111)';
tx.textAlign = 'center';
tx.textBaseline = 'middle';
tx.font = '800 150px "Hiragino Maru Gothic ProN", "M PLUS Rounded 1c", "Yu Gothic", sans-serif';
tx.fillText('和の「おもてなし」で、', TEX_W / 2, TEX_H * 0.30);
tx.fillText('旅を彩る。', TEX_W / 2, TEX_H * 0.30 + 175);

// Mapea un triángulo de la textura fuente a un triángulo de destino
// mediante una transformación afín (3 pares de puntos → matriz 2x3).
function drawTriangle(img, sx0, sy0, sx1, sy1, sx2, sy2, dx0, dy0, dx1, dy1, dx2, dy2) {
  const denom = (sx1 - sx0) * (sy2 - sy0) - (sx2 - sx0) * (sy1 - sy0);
  if (Math.abs(denom) < 1e-6) return;
  const a = ((sy2 - sy0) * (dx1 - dx0) - (sy1 - sy0) * (dx2 - dx0)) / denom;
  const b = ((sy2 - sy0) * (dy1 - dy0) - (sy1 - sy0) * (dy2 - dy0)) / denom;
  const c = ((sx1 - sx0) * (dx2 - dx0) - (sx2 - sx0) * (dx1 - dx0)) / denom;
  const d = ((sx1 - sx0) * (dy2 - dy0) - (sx2 - sx0) * (dy1 - dy0)) / denom;
  const e = dx0 - a * sx0 - c * sy0;
  const f = dy0 - b * sx0 - d * sy0;

  // El área de recorte se expande un poco desde el centroide (la
  // transformación de textura usa los vértices originales, sin tocar)
  // para que los dos triángulos de cada celda se solapen ligeramente
  // y no quede una costura visible en la diagonal entre ellos.
  const cx = (dx0 + dx1 + dx2) / 3, cy = (dy0 + dy1 + dy2) / 3;
  const S = 1.03;

  ctx.save();
  ctx.beginPath();
  ctx.moveTo(cx + (dx0 - cx) * S, cy + (dy0 - cy) * S);
  ctx.lineTo(cx + (dx1 - cx) * S, cy + (dy1 - cy) * S);
  ctx.lineTo(cx + (dx2 - cx) * S, cy + (dy2 - cy) * S);
  ctx.closePath();
  ctx.clip();
  ctx.transform(a, b, c, d, e, f);
  ctx.drawImage(img, 0, 0);
  ctx.restore();
}

function draw(prog) {
  ctx.clearRect(0, 0, W, H);
  ctx.save();

  // "Cámara": zoom hacia el centro durante la apertura
  if (phase === 'opening') {
    const s = 1 + easeInOut(prog) * 1.5;
    const cx = W / 2, cy = rodY + clothH * 0.55;
    ctx.translate(cx, cy);
    ctx.scale(s, s);
    ctx.translate(-cx, -cy);
  }

  // Barra
  ctx.strokeStyle = '#8a7156';
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-30, rodY - 2);
  ctx.lineTo(W + 30, rodY - 2);
  ctx.stroke();

  // Tela: textura nítida mapeada por triángulos + sombreado dinámico de pliegues
  for (const st of strips) {
    const pts = st.pts;
    for (let r = 0; r < ROWS - 1; r++) {
      for (let c = 0; c < COLS - 1; c++) {
        const p1 = pts[idx(r, c)];
        const p2 = pts[idx(r, c + 1)];
        const p3 = pts[idx(r + 1, c + 1)];
        const p4 = pts[idx(r + 1, c)];

        // Coordenadas de textura según la posición de reposo de cada punto
        const t1x = (p1.rx / W) * TEX_W, t1y = ((p1.ry - rodY) / clothH) * TEX_H;
        const t2x = (p2.rx / W) * TEX_W, t2y = ((p2.ry - rodY) / clothH) * TEX_H;
        const t3x = (p3.rx / W) * TEX_W, t3y = ((p3.ry - rodY) / clothH) * TEX_H;
        const t4x = (p4.rx / W) * TEX_W, t4y = ((p4.ry - rodY) / clothH) * TEX_H;

        drawTriangle(fabricTex, t1x, t1y, t2x, t2y, t4x, t4y, p1.x, p1.y, p2.x, p2.y, p4.x, p4.y);
        drawTriangle(fabricTex, t2x, t2y, t3x, t3y, t4x, t4y, p2.x, p2.y, p3.x, p3.y, p4.x, p4.y);

        // Sombreado dinámico por compresión horizontal (pliegues): resalte
        // cálido en las crestas que dan a la luz, sombra en los valles.
        // Sutil a propósito, para no romper la lectura del texto.
        const sh = Math.max(0.55, Math.min(1.25, (p2.x - p1.x) / cellW));
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.lineTo(p3.x, p3.y);
        ctx.lineTo(p4.x, p4.y);
        ctx.closePath();
        if (sh > 1) {
          ctx.fillStyle = `rgba(255,250,235,${Math.min(0.14, (sh - 1) * 0.5)})`;
        } else {
          ctx.fillStyle = `rgba(90,65,35,${Math.min(0.12, (1 - sh) * 0.45)})`;
        }
        ctx.fill();
      }
    }

  }

  // Costuras doradas finas junto a cada hueco entre paños: una a ~10px
  // hacia dentro del paño izquierdo y su pareja simétrica a ~10px hacia
  // dentro del paño derecho (el hueco en sí no se rellena con nada).
  const SEAM_INSET = 10;
  const insetT = Math.min(1, SEAM_INSET / cellW);
  for (let i = 0; i < strips.length - 1; i++) {
    const a = strips[i].pts;
    const b = strips[i + 1].pts;
    ctx.strokeStyle = 'rgba(201,154,91,0.5)';
    ctx.lineWidth = 2;

    ctx.beginPath();
    for (let r = 0; r < ROWS; r++) {
      const edge = a[idx(r, COLS - 1)], inner = a[idx(r, COLS - 2)];
      const x = edge.x + (inner.x - edge.x) * insetT, y = edge.y + (inner.y - edge.y) * insetT;
      if (r === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();

    ctx.beginPath();
    for (let r = 0; r < ROWS; r++) {
      const edge = b[idx(r, 0)], inner = b[idx(r, 1)];
      const x = edge.x + (inner.x - edge.x) * insetT, y = edge.y + (inner.y - edge.y) * insetT;
      if (r === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }

  // Texto: se pinta al final, por encima de las costuras.
  for (const st of strips) {
    const pts = st.pts;
    for (let r = 0; r < ROWS - 1; r++) {
      for (let c = 0; c < COLS - 1; c++) {
        const p1 = pts[idx(r, c)];
        const p2 = pts[idx(r, c + 1)];
        const p3 = pts[idx(r + 1, c + 1)];
        const p4 = pts[idx(r + 1, c)];

        const t1x = (p1.rx / W) * TEX_W, t1y = ((p1.ry - rodY) / clothH) * TEX_H;
        const t2x = (p2.rx / W) * TEX_W, t2y = ((p2.ry - rodY) / clothH) * TEX_H;
        const t3x = (p3.rx / W) * TEX_W, t3y = ((p3.ry - rodY) / clothH) * TEX_H;
        const t4x = (p4.rx / W) * TEX_W, t4y = ((p4.ry - rodY) / clothH) * TEX_H;

        drawTriangle(textTex, t1x, t1y, t2x, t2y, t4x, t4y, p1.x, p1.y, p2.x, p2.y, p4.x, p4.y);
        drawTriangle(textTex, t2x, t2y, t3x, t3y, t4x, t4y, p2.x, p2.y, p3.x, p3.y, p4.x, p4.y);
      }
    }
  }

  ctx.restore();

  // Halo de luz ambiental suave, como si entrara luz desde arriba-izquierda
  const light = ctx.createRadialGradient(W * 0.3, H * 0.02, 0, W * 0.3, H * 0.02, Math.max(W, H) * 0.85);
  light.addColorStop(0, 'rgba(255,248,230,0.25)');
  light.addColorStop(0.55, 'rgba(255,248,230,0.08)');
  light.addColorStop(1, 'rgba(255,248,230,0)');
  ctx.save();
  ctx.globalCompositeOperation = 'lighten';
  ctx.fillStyle = light;
  ctx.fillRect(0, 0, W, H);
  ctx.restore();
}

/* ---------- Bucle ---------- */
function loop(now) {
  let prog = 0;

  if (phase === 'opening') {
    prog = Math.min(1, (now - openStart) / DUR);
    // Fundido del canvas en la segunda mitad de la apertura
    cv.style.opacity = prog < 0.55 ? '1' : String(1 - (prog - 0.55) / 0.45);
    if (prog >= 1) finishIntro();
  }

  if (phase !== 'open') {
    step(prog);
    draw(prog);
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>

</body>
</html>
